name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: test
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          VITE_API_URL: ${{ vars.STAGING_API_URL }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      # Replace the steps below with your actual deployment mechanism
      # (e.g. AWS ECS, Fly.io, Render, SSH deploy, kubectl apply, etc.)
      - name: Deploy backend
        run: |
          echo "Deploy backend to staging"
          # Example: aws ecs update-service --cluster staging --service backend --force-new-deployment
        env:
          APP_ENV: staging
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          STREAM_SECRET_ENCRYPTION_KEY: ${{ secrets.STAGING_STREAM_SECRET_ENCRYPTION_KEY }}
          ALLOWED_ORIGINS: ${{ vars.STAGING_ALLOWED_ORIGINS }}
          STELLAR_NETWORK: testnet
          HORIZON_URL: https://horizon-testnet.stellar.org

      - name: Deploy frontend
        run: |
          echo "Deploy frontend build artifacts to staging"
          # Example: aws s3 sync frontend/dist s3://staging-bucket --delete

      - name: Smoke test
        run: |
          echo "Running smoke tests against staging"
          # Example: curl -f ${{ vars.STAGING_API_URL }}/health

      - name: Notify on success
        if: success()
        run: echo "✅ Staging deployment succeeded for ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Staging deployment failed for ${{ github.sha }}"
